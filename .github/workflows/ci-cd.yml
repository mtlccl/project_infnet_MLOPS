name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ==========================================
  # FASE 1: INTEGRAÇÃO CONTÍNUA (CI)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ==========================================
  # FASE 2: DEPLOY CONTÍNUO (CD) NA AWS
  # ==========================================
  deploy-to-aws:
    # Esta linha garante que ele só faz o deploy se o código estiver sem erros!
    needs: build-and-test 
    runs-on: ubuntu-latest

    steps:
    - name: Executar atualização e retreinamento via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        # Aqui estão os comandos que o robô vai digitar no terminal da AWS:
        script: |
          cd /home/ubuntu/MLOps_pjt_infnet
          
          echo "Puxando código novo do GitHub..."
          git pull origin main
          
          echo "Ativando ambiente virtual..."
          source venv/bin/activate
          
          echo "Instalando possíveis bibliotecas novas..."
          pip install -r requirements.txt
          
          echo "Iniciando retreinamento do modelo..."
          export AWS_DEFAULT_REGION=us-east-1
          python -m src.experiment
          
          echo "Deploy do Backend concluído com sucesso!"